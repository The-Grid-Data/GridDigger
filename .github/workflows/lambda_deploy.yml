name: Deploy to AWS Lambda

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.8'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flask[async]~=2.3.2 uvicorn~=0.23.2 asgiref~=3.7.2
          pip install awscli aws-sam-cli

      - name: Set up AWS CLI
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          aws --version

      - name: Package the application with SAM
        run: |
          sam package --template-file template.yaml --output-template-file packaged.yaml --s3-bucket ${{ secrets.AWS_S3_BUCKET }}

      - name: Deploy the application with SAM
        run: |
          sam deploy --template-file packaged.yaml --stack-name telegram-bot-stack --capabilities CAPABILITY_IAM --parameter-overrides TelegramBotToken=${{ secrets.TELEGRAM_BOT_TOKEN }}

      - name: Verify Deployment
        run: |
          aws cloudformation describe-stacks --stack-name telegram-bot-stack
